<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    header {
      background: #6366f1;
      color: white;
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.2rem; }
    header span { font-size: 0.9rem; opacity: 0.85; }

    .logout {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .logout:hover { background: rgba(255,255,255,0.3); }

    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .bienvenida {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .bienvenida h2 { color: #1e293b; margin-bottom: 0.3rem; }
    .bienvenida p  { color: #64748b; font-size: 0.95rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.2rem;
    }

    .modulo {
      background: white;
      border-radius: 12px;
      padding: 1.8rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .modulo:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .modulo .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .modulo h3   { color: #1e293b; margin-bottom: 0.4rem; }
    .modulo p    { color: #64748b; font-size: 0.88rem; }

    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #16a34a;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-top: 0.6rem;
      font-weight: 600;
    }

    .badge.soon {
      background: #f1f5f9;
      color: #94a3b8;
    }

    #no-sesion {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }
  </style>
</head>
<body>

<header>
  <h1>📚 Hub Educativo</h1>
  <div style="display:flex; align-items:center; gap:1rem;">
    <span id="header-nombre"></span>
    <button class="logout" onclick="cerrarSesion()">Sign out</button>
  </div>
</header>

<div class="container">

  <div class="bienvenida">
    <h2 id="saludo">Welcome!</h2>
    <p id="info-asignatura">Loading...</p>
  </div>

  <div class="grid">

    <a class="modulo" href="#" onclick="irAlExamen()">
      <div class="icon">📝</div>
      <h3>Exams</h3>
      <p>Access active exams for your subject</p>
      <span class="badge">Available</span>
    </a>

    <a class="modulo" href="asistencia.html">
      <div class="icon">📍</div>
      <h3>Attendance</h3>
      <p>Scan the QR code to register your attendance</p>
      <span class="badge">Available</span>
    </a>

    <a class="modulo" href="notas.html">
      <div class="icon">📊</div>
      <h3>My Grades</h3>
      <p>Check your grades and progress</p>
      <span class="badge soon">Coming soon</span>
    </a>

    <a class="modulo" href="materiales.html">
      <div class="icon">📁</div>
      <h3>Materials</h3>
      <p>Slides, notes and resources</p>
      <span class="badge soon">Coming soon</span>
    </a>

  </div>
</div>

<script type="module">
  import { supabase } from './js/config.js'

  const estudiante = JSON.parse(sessionStorage.getItem('estudiante'))

  // Si no hay sesión, redirigir al login
  if (!estudiante) {
    window.location.href = 'index.html'
  } else {
    document.getElementById('header-nombre').textContent = estudiante.nombre
    document.getElementById('saludo').textContent = `Welcome, ${estudiante.nombre.split(' ')[0]}! 👋`

    // Cargar nombre de la asignatura
    const { data } = await supabase
      .from('asignaturas')
      .select('nombre')
      .eq('id', estudiante.asignatura_id)
      .single()

    if (data) {
      document.getElementById('info-asignatura').textContent =
        `${data.nombre} · Group ${estudiante.grupo}`
    }
  }

  window.cerrarSesion = function () {
    sessionStorage.clear()
    window.location.href = 'index.html'
  }
  window.irAlExamen = function() {
  const asignaturas = {
    'STAT-I': 'examen.html',
    'TTD-I':  'examen-ttd.html'
  }

  // Buscar el código de la asignatura del estudiante
  supabase
    .from('asignaturas')
    .select('codigo')
    .eq('id', estudiante.asignatura_id)
    .single()
    .then(({ data }) => {
      const url = data ? (asignaturas[data.codigo] || 'examen.html') : 'examen.html'
      window.location.href = url
    })
}
</script>

</body>
</html>
